# ansible/group_vars/dev.yml
---
env: dev

# FiveM
fivem_user: fivem
fivem_dir: /opt/fivem
fivem_server_dir: "{{ fivem_dir }}/server"
fivem_resources_dir: "{{ fivem_dir }}/resources"
fivem_artifacts_url: "https://runtime.fivem.net/artifacts/fivem/build_proot_linux/master"

fivem_server_name: "[DEV] VCR GTA - Test Server"
fivem_max_clients: 5
fivem_license_key: "{{ vault_fivem_license_key }}"
fivem_steam_api_key: "{{ vault_steam_api_key }}"
fivem_txadmin_port: 40120

# Mumble Voice
fivem_voice_enabled: true
fivem_voice_proximity: 30.0

# MariaDB (ローカル)
db_host: "127.0.0.1"
db_port: 3306
db_name: fivem
db_user: fivem
db_password: "{{ vault_db_password }}"
db_root_password: "{{ vault_db_root_password }}"
use_rds: false

# Whitelist API
whitelist_api_port: 8000
whitelist_api_token: "{{ vault_whitelist_api_token }}"
whitelist_api_allowed_ips: []  # 空 = 全許可 (dev)

# MOD リポジトリ
mod_repos:
  - name: vcr-gta-scripts
    repo: "https://github.com/your-org/vcr-gta-scripts.git"
    branch: develop
  - name: vcr-gta-vehicles
    repo: "https://github.com/your-org/vcr-gta-vehicles.git"
    branch: develop
  - name: vcr-gta-maps
    repo: "https://github.com/your-org/vcr-gta-maps.git"
    branch: develop

# DDoS / iptables レートリミット (dev は緩め)
udp_rate_limit: "100/s"
udp_rate_burst: 200
